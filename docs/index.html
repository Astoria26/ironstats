nav{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px}

.cnt{padding:16px 20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
.sel{background:var(--bg2);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12px;cursor:pointer}
.stat{background:var(--bg3);border-radius:8px;padding:10px;text-align:center}
.sv{font-size:17px;font-weight:800;font-family:'Barlow Condensed',sans-serif}
.sl{font-size:9px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:7px 5px;text-align:left;border-bottom:2px solid var(--bd);color:var(--tx3);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;user-select:none}
td{padding:6px 5px;border-bottom:1px solid var(--bd);white-space:nowrap}tr:hover td{background:var(--bg3)}
.sw{color:var(--sw)}.bk{color:var(--bk)}.rn{color:var(--rn)}.mono{font-family:'Barlow Condensed',monospace}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-70{background:#eff6ff;color:var(--acc);border:1px solid #bfdbfe}.top3{background:#f0fdf4}
.back{background:none;border:none;color:var(--acc);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:0;margin-bottom:12px}
.overflow{overflow-x:auto}
.tgl{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;font-size:11px;font-weight:600;color:var(--tx3);transition:all .15s;font-family:inherit}
.tgl.on{border-color:var(--acc);background:#eff6ff;color:var(--acc)}
.hero{text-align:center;padding:36px 20px 24px}.hero h1{font-size:28px;font-weight:800;margin-bottom:6px}.hero p{font-size:14px;color:var(--tx2);max-width:560px;margin:0 auto 20px}
.feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.feat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.feat-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.feat-card .icon{font-size:24px;margin-bottom:8px}.feat-card h3{font-size:13px;font-weight:700;margin-bottom:3px}.feat-card p{font-size:11px;color:var(--tx2)}
.ci{flex:1;background:var(--bg3);border-radius:8px;padding:8px 10px;min-width:140px}
.tip{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:11px;color:#92400e;margin-top:8px}
.wx{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border-radius:6px;font-size:11px;color:var(--tx2);margin:2px}
a{color:var(--acc)}
.sim-input{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px;width:100px;text-align:center}

  if(window._simRan)runSim();
}

function parseInput(v){var p=v.split(":").map(Number);if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];return 0}

window.runSim=function(){
  var ss=document.getElementById("simS").value,sb=document.getElementById("simB").value,sr=document.getElementById("simR").value;
  window._ss=ss;window._sb=sb;window._sr=sr;window._simRan=true;
  var swimS=parseInput(ss),bikeS=parseInput(sb),runS=parseInput(sr),totalS=swimS+bikeS+runS;
  var el=document.getElementById("simResult");
  var h="<div class='card' style='margin-top:12px'><div style='font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;margin-bottom:10px'>Resultado da simulação — "+AG+"</div>";
  h+="<div style='margin-bottom:10px;font-size:14px'>Tempo total estimado: <b class='mono' style='font-size:18px'>"+s2t(totalS)+"</b></div>";
  h+="<div class='overflow'><table><tr><th>Prova</th><th># na AG</th><th>Sua posição</th><th>Posição nat</th><th>Posição bike</th><th>Posição corrida</th></tr>";
  var simCity=window._simCity||Object.keys(SE)[0];
  var simIds=SE[simCity]||[];
  simIds.forEach(function(id){
    var m=M[id],fin=R[id].filter(function(r){return r[3]===AG&&r[5]});
    if(!fin.length)return;
    fin.sort(function(a,b){return a[5]-b[5]});
    var posT=1,posS=1,posB=1,posR=1;
    fin.forEach(function(a){if(a[5]<totalS)posT++;if(a[6]<swimS)posS++;if(a[7]<bikeS)posB++;if(a[8]<runS)posR++});
    var emoji="";
    h+="<tr><td style='font-weight:600'>"+m.c.split(' ')[0]+" "+m.y+"</td><td>"+fin.length+"</td>";
    h+="<td style='font-weight:800;font-size:13px'>"+emoji+" "+posT+"º / "+fin.length+"</td>";
    h+="<td class='sw'>"+posS+"º</td><td class='bk'>"+posB+"º</td><td class='rn'>"+posR+"º</td></tr>"});
  h+="</table></div>";
  h+="<div style='margin-top:8px;font-size:11px;color:var(--tx3)'>Posição = quantos atletas fizeram tempo melhor que o seu + 1. Baseado em dados reais de cada edição.</div></div>";
  el.innerHTML=h;
}

window.tCmp=function(id){if(!CR)CR=RI.slice();var i=CR.indexOf(id);if(i>=0)CR.splice(i,1);else CR.push(id);ren()};
SR=RI[0];ren();
</script></body></html>
