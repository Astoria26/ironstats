<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IronStats Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ef;--bg2:#fff;--bg3:#f0ede8;--tx:#1a1a1a;--tx2:#5a5a5a;--tx3:#8a8a8a;--bd:#e5e1da;--sw:#0ea5e9;--bk:#ea580c;--rn:#16a34a;--acc:#2563eb;--gold:#b8860b;--silver:#6b7280;--bronze:#a0522d}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:22px;font-weight:800;color:var(--acc)}.logo span{color:var(--rn)}.sub{font-size:13px;color:var(--tx3);margin-left:8px}
nav{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px}
nav button{padding:7px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;background:transparent;color:var(--tx2);transition:all .2s}
nav button.on{background:var(--acc);color:#fff}
.cnt{padding:16px 20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
.sel{background:var(--bg2);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12px;cursor:pointer}
.stat{background:var(--bg3);border-radius:8px;padding:10px;text-align:center}
.sv{font-size:20px;font-weight:800;font-family:'Barlow Condensed',sans-serif}
.sl{font-size:11px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:7px 5px;text-align:left;border-bottom:2px solid var(--bd);color:var(--tx3);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;user-select:none}
td{padding:6px 5px;border-bottom:1px solid var(--bd);white-space:nowrap}tr:hover td{background:var(--bg3)}
.sw{color:var(--sw)}.bk{color:var(--bk)}.rn{color:var(--rn)}.mono{font-family:'Barlow Condensed',monospace}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
.b-70{background:#eff6ff;color:var(--acc);border:1px solid #bfdbfe}.top3{background:#f0fdf4}
.back{background:none;border:none;color:var(--acc);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:0;margin-bottom:12px}
.overflow{overflow-x:auto}
.tgl{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx3);transition:all .15s;font-family:inherit}
.tgl.on{border-color:var(--acc);background:#eff6ff;color:var(--acc)}
.hero{text-align:center;padding:36px 20px 24px}.hero h1{font-size:32px;font-weight:800;margin-bottom:6px}.hero p{font-size:16px;color:var(--tx2);max-width:560px;margin:0 auto 20px}
.feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.feat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.feat-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.feat-card .icon{font-size:24px;margin-bottom:8px}.feat-card h3{font-size:13px;font-weight:700;margin-bottom:3px}.feat-card p{font-size:13px;color:var(--tx2)}
.ci{flex:1;background:var(--bg3);border-radius:8px;padding:8px 10px;min-width:140px}
.tip{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:13px;color:#92400e;margin-top:8px}
.wx{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border-radius:6px;font-size:13px;color:var(--tx2);margin:2px}
a{color:var(--acc)}
.sim-input{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px;width:100px;text-align:center}
</style><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script></head><body>
<div class="hdr"><div style="display:flex;align-items:baseline;gap:4px">
<span class="logo">Iron<span>Stats</span></span><span class="sub">Ironman 70.3 Brasil · Resultados e análise</span>
</div><div style="display:flex;align-items:center;gap:8px"><nav id="nav"></nav><button id="langBtn" class="tgl on" onclick="toggleLang()" style="font-size:11px;padding:4px 10px">EN</button></div></div>
<div class="cnt" id="app"></div>
<script>
var D=/*DATA_PLACEHOLDER*/;
var W=/*WEATHER_PLACEHOLDER*/;var CI=/*COURSE_PLACEHOLDER*/;var SE=/*SERIES_PLACEHOLDER*/;
var M=D.m,R=D.d,RI=Object.keys(M);
function s2t(s){if(!s||s<=0)return"--:--:--";var h=Math.floor(s/3600),m=Math.floor(s%3600/60),c=Math.floor(s%60);return h+":"+String(m).padStart(2,"0")+":"+String(c).padStart(2,"0")}
function sP(s,k){if(!s)return"--";var p=s/(k*10);return Math.floor(p/60)+":"+String(Math.round(p%60)).padStart(2,"0")+"/100m"}
function bS(s,k){if(!s)return"--";return(k/(s/3600)).toFixed(1)+"km/h"}
function rP(s,k){if(!s)return"--";var p=s/k;return Math.floor(p/60)+":"+String(Math.round(p%60)).padStart(2,"0")+"/km"}
function tT(s){if(!s||s<=0)return'--';var m=Math.floor(s/60),c=Math.round(s%60);return m+':'+String(c).padStart(2,'0')}
function nth(a,n){var f=a.filter(function(x){return x&&x>0});if(!f.length||n>f.length)return 0;f.sort(function(x,y){return x-y});return f[Math.min(n-1,f.length-1)]}
function av(a){var f=a.filter(function(x){return x&&x>0});if(!f.length)return 0;return f.reduce(function(s,v){return s+v},0)/f.length}
function aAgs(){var o={};RI.forEach(function(id){R[id].forEach(function(r){if(r[5]&&r[3])o[r[3]]=1})});return Object.keys(o).sort()}
function getCi(id){var c=id.substring(0,2);if(c==="rj"&&parseInt(id.substring(2))<=22)return CI.rj_old;return CI[c]||CI.sp}


var LG="pt";
var TX={
pt:{home:"Home",races:"Provas",results:"Resultados",podium:"Pódio/AG",compare:"Comparador",trends:"Tendências",sim:"Simulador",
heroTitle:"'+L('heroTitle')+'",heroSub:"'+L('heroSub')+'",
racesTitle:"Provas",resultsBack:"← Provas",finished:"Finalizaram",avgPace:"Pace médio",avgSpeed:"Vel média",all:"Todos",
podiumTitle:"Pódio / AG",compareTitle:"Comparador",trendsTitle:"Tendências",simTitle:"Simulador de Meta",
simSub:"'+L('simSub')+'",
posTarget:"Posição alvo:",timeNeeded:"Tempo necessário por posição",conditions:"Condições de prova",
simResult:"Resultado da simulação",totalEst:"'+L('totalEst')+'",position:"Sua posição",posNat:"Pos nat",posBike:"Pos bike",posRun:"Pos cor",
simulate:"Simular",nat:"Nat",bike:"Bike",cor:"Cor",pace:"Pace",total:"Total",pos:"Pos",year:"Ano",athletes:"Atletas",
date:"Data",temp:"Temp",humidity:"Umid.",altitude:"Alt.",water:"Água",condition:"Condição",wind:"Vento",
vsLast:"vs anterior",faster:"mais rápido",slower:"mais lento",stable:"estável",noData:"sem dados",
race:"Prova",category:"Categoria",swimInput:"Natação (mm:ss)",bikeInput:"Bike (h:mm:ss)",runInput:"Corrida (h:mm:ss)"},
en:{home:"Home",races:"Races",results:"Results",podium:"Podium/AG",compare:"Compare",trends:"Trends",sim:"Simulator",
heroTitle:"70.3 race results and analysis in Brazil",heroSub:"Splits by discipline, edition comparison, historical trends and position simulator. Data from 2022 to 2025.",
racesTitle:"Races",resultsBack:"← Races",finished:"Finished",avgPace:"Avg pace",avgSpeed:"Avg speed",all:"All",
podiumTitle:"Podium / AG",compareTitle:"Compare",trendsTitle:"Trends",simTitle:"Goal Simulator",
simSub:"Enter your times by discipline and see what position you would finish in each edition.",
posTarget:"Target position:",timeNeeded:"Time needed by position",conditions:"Race conditions",
simResult:"Simulation result",totalEst:"Estimated total time:",position:"Your position",posNat:"Swim pos",posBike:"Bike pos",posRun:"Run pos",
simulate:"Simulate",nat:"Swim",bike:"Bike",cor:"Run",pace:"Pace",total:"Total",pos:"Pos",year:"Year",athletes:"Athletes",
date:"Date",temp:"Temp",humidity:"Humid.",altitude:"Alt.",water:"Water",condition:"Condition",wind:"Wind",
vsLast:"vs previous",faster:"faster",slower:"slower",stable:"stable",noData:"no data",
race:"Race",category:"Category",swimInput:"Swim (mm:ss)",bikeInput:"Bike (h:mm:ss)",runInput:"Run (h:mm:ss)"}
};
function L(k){return TX[LG][k]||k}
function toggleLang(){LG=LG==="pt"?"en":"pt";document.getElementById("langBtn").textContent=LG==="pt"?"EN":"PT";ren()}
var V="home",SR=null,AG="all",SC=5,SD=1,CR=null,TP=5;

function ren(){
  var tabs=[L("home"),L("races"),L("results"),L("podium"),L("compare"),L("trends"),L("sim")];
  var views=["home","races","results","podium","compare","trends","sim"];
  document.getElementById("nav").innerHTML=tabs.map(function(t,i){
    return "<button class='"+(V===views[i]?"on":"")+"' onclick=\"V='"+views[i]+"';ren()\">"+t+"</button>"
  }).join("");
  var a=document.getElementById("app");
  var fn={home:rHome,races:rRaces,results:rResults,podium:rPodium,compare:rCompare,trends:rTrends,sim:rSim};
  fn[V](a);
}

function rHome(el){
  var tot=0;RI.forEach(function(id){tot+=R[id].length});
  var h="<div class='hero'><h1>"+(LG==="pt"?"Resultados e análise de provas 70.3 no Brasil":"70.3 race results and analysis in Brazil")+"</h1>";
  h+="<p>"+(LG==="pt"?"Splits por modalidade, comparativo entre edições, evolução histórica e simulador de posição. Dados de 2022 a 2025.":"Splits by discipline, edition comparison, historical trends and position simulator. Data from 2022 to 2025.")+"</p>";
  h+="<div style='display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px'>";
  h+="<div class='stat' style='min-width:90px'><div class='sv' style='color:var(--acc)'>"+RI.length+"</div><div class='sl'>"+(LG==="pt"?"Edições":"Editions")+"</div></div>";
  h+="<div class='stat' style='min-width:90px'><div class='sv' style='color:var(--rn)'>"+tot.toLocaleString()+"</div><div class='sl'>"+(LG==="pt"?"Resultados":"Results")+"</div></div>";
  h+="<div class='stat' style='min-width:90px'><div class='sv' style='color:var(--bk)'>2022-25</div><div class='sl'>"+(LG==="pt"?"Período":"Period")+"</div></div></div></div>";
  h+="<div class='feat'>";
  var cards=[
    ["races",(LG==="pt"?"Provas":"Races"),(LG==="pt"?"Percursos, altimetria e condições":"Courses, elevation and conditions")],
    ["results",(LG==="pt"?"Resultados":"Results"),(LG==="pt"?"Splits, paces e filtro por categoria":"Splits, paces and AG filter")],
    ["podium",(LG==="pt"?"Pódio / AG":"Podium / AG"),(LG==="pt"?"Tempos por posição e modalidade":"Times by position and discipline")],
    ["compare",(LG==="pt"?"Comparador":"Compare"),(LG==="pt"?"Provas e edições lado a lado":"Races and editions side by side")],
    ["trends",(LG==="pt"?"Tendências":"Trends"),(LG==="pt"?"Evolução dos tempos ano a ano":"Year over year time evolution")],
    ["sim",(LG==="pt"?"Simulador":"Simulator"),(LG==="pt"?"Preveja sua posição":"Predict your finishing position")]
  ];
  cards.forEach(function(c){
    var onclick=c[0]==="results"?"V=\'results\';SR=RI[0];ren()":"V=\'"+c[0]+"\';ren()";
    h+="<div class='feat-card' onclick=\""+onclick+"\"><h3>"+c[1]+"</h3><p>"+c[2]+"</p></div>";
  });
  h+="</div>";
  el.innerHTML=h;
}

function wxBadge(id){var w=W[id];if(!w)return"";return "<div style='display:flex;gap:4px;flex-wrap:wrap;margin-top:6px'>"+
  "<span class='wx'>"+w.date+"</span><span class='wx'>"+w.temp+"°C</span><span class='wx'>"+w.hum+"%</span>"+
  "<span class='wx'>"+w.alt+"m</span><span class='wx'>"+w.chuva+"</span><span class='wx'>Água "+w.agua+"°C</span></div>"}

function rRaces(el){
  var rCity=window._rCity||Object.keys(SE)[0];
  var h="<h2 style='font-size:17px;font-weight:700;margin-bottom:12px'>Provas</h2>";
  h+="<div style='display:flex;gap:8px;margin-bottom:14px'>";
  Object.keys(SE).forEach(function(c){h+="<button class='tgl "+(rCity===c?"on":"")+"' onclick=\"window._rCity='"+c+"';ren()\">"+c+"</button>"});
  h+="</div>";
  var ids=SE[rCity],ci=getCi(ids[ids.length-1]);
  h+="<div class='card'><div style='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px'>";
  h+="<div class='ci'><b style='color:var(--sw)'>NAT</b> <span style='font-size:13px;color:var(--tx2)'>"+ci.swimDesc+"</span></div>";
  h+="<div class='ci'><b style='color:var(--bk)'>BIKE</b> <span style='font-size:13px;color:var(--tx2)'>"+ci.bikeDesc+"</span><div style='font-size:13px;font-weight:700;color:var(--bk)'>↗"+ci.bikeElev+"m</div>"+"</div>";
  h+="<div class='ci'><b style='color:var(--rn)'>COR</b> <span style='font-size:13px;color:var(--tx2)'>"+ci.runDesc+"</span><div style='font-size:13px;font-weight:700;color:var(--bk)'>↗"+ci.runElev+"m</div></div></div>";
  h+="<div class='overflow'><table><tr><th>Ano</th><th>Atletas</th><th>Data</th><th>Temp</th><th>Umid.</th><th>Alt.</th><th>Água</th><th>Vento</th><th>Condição</th></tr>";
  ids.slice().reverse().forEach(function(id){var m=M[id],w=W[id]||{};
    h+="<tr style='cursor:pointer' onclick=\"SR='"+id+"';V='results';ren()\"><td style='font-weight:800;font-size:14px'>"+m.y+"</td><td>"+R[id].length+"</td><td>"+(w.date||"-")+"</td><td>"+(w.temp||"-")+"°C</td><td>"+(w.hum||"-")+"%</td><td>"+(w.alt||"-")+"m</td><td>"+(w.agua||"-")+"°C</td><td>"+(w.vento||"-")+"</td><td>"+(w.chuva||"-")+"</td></tr>"});
  h+="</table></div></div>";
  // Distribution section
  h+="<div class='card'><div style='font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;margin-bottom:8px'>Distribuição de tempos</div>";
  h+="<div style='display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center'>";
  h+="<span style='font-size:12px;color:var(--tx3)'>Categoria:</span><select class='sel' id='distAG' onchange='renderDist()'><option value='all'>Todos</option></select>";
  h+="<span style='font-size:12px;color:var(--tx3);margin-left:8px'>Ano:</span><select class='sel' id='distYear' onchange='renderDist()'><option value='all'>Todos os anos</option></select>";
  h+="</div>";
  h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:12px'>";
  h+="<div style='position:relative;height:220px'><canvas id='distTotal'></canvas></div>";
  h+="<div style='position:relative;height:220px'><canvas id='distSwim'></canvas></div>";
  h+="<div style='position:relative;height:220px'><canvas id='distBike'></canvas></div>";
  h+="<div style='position:relative;height:220px'><canvas id='distRun'></canvas></div>";
  h+="</div></div>";
  el.innerHTML=h;
  // Populate AG and Year selectors
  var distSel=document.getElementById('distAG');
  var yearSel=document.getElementById('distYear');
  if(distSel){
    var dags=[];
    ids.forEach(function(id){R[id].forEach(function(r){if(r[5]&&r[3]&&dags.indexOf(r[3])<0)dags.push(r[3])})});
    dags.sort();
    dags.forEach(function(ag){var o=document.createElement('option');o.value=ag;o.text=ag;distSel.appendChild(o)});
  }
  if(yearSel){
    ids.forEach(function(id){var o=document.createElement('option');o.value=id;o.text=M[id].y;yearSel.appendChild(o)});
  }
  window._distCity=rCity;
  window._distIds=ids;
  setTimeout(function(){renderDist()},100);
}

function renderDist(){
  var ids=window._distIds;if(!ids)return;
  var ag=document.getElementById('distAG')?document.getElementById('distAG').value:'all';
  var yr=document.getElementById('distYear')?document.getElementById('distYear').value:'all';
  var useIds=yr==='all'?ids:[yr];
  var allFin=[];
  useIds.forEach(function(id){
    if(!R[id])return;
    R[id].forEach(function(r){if(r[5]&&(ag==='all'||r[3]===ag))allFin.push(r)});
  });
  if(!allFin.length)return;
  var yrLabel=yr==='all'?'todos os anos':M[yr].y;
  // Destroy old charts
  ['_dc1','_dc2','_dc3','_dc4'].forEach(function(k){try{if(window[k])window[k].destroy()}catch(e){}});
  function makeHist(canvasId,data,label,color,binSize,storeKey,fmtLabel){
    var cv=document.getElementById(canvasId);if(!cv||!data.length)return;
    var mn=Math.floor(Math.min.apply(null,data)/binSize)*binSize;
    var mx=Math.ceil(Math.max.apply(null,data)/binSize)*binSize;
    var bins=[],labs=[];
    for(var i=mn;i<mx;i+=binSize){bins.push(0);labs.push(fmtLabel?fmtLabel(i):i+'m')}
    data.forEach(function(v){var idx=Math.min(Math.floor((v-mn)/binSize),bins.length-1);if(idx>=0)bins[idx]++});
    window[storeKey]=new Chart(cv,{type:'bar',
      data:{labels:labs,datasets:[{label:label,data:bins,backgroundColor:color+'44',borderColor:color,borderWidth:1}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:label+' ('+yrLabel+')',font:{size:13}}},scales:{y:{title:{display:true,text:'Atletas'}}}}
    });
  }
  try{
    var fmtH=function(m){return Math.floor(m/60)+'h'+String(Math.round(m%60)).padStart(2,'0')};
    makeHist('distTotal',allFin.map(function(r){return r[5]/60}),'Tempo total','#2563eb',5,'_dc1',fmtH);
    makeHist('distSwim',allFin.filter(function(r){return r[6]}).map(function(r){return r[6]/60}),'Natação','#0ea5e9',1,'_dc2');
    makeHist('distBike',allFin.filter(function(r){return r[7]}).map(function(r){return r[7]/60}),'Bike','#ea580c',10,'_dc3',fmtH);
    makeHist('distRun',allFin.filter(function(r){return r[8]}).map(function(r){return r[8]/60}),'Corrida','#16a34a',5,'_dc4');
  }catch(e){console.log('Dist error:',e)}
}

function rResults(el){
  if(!SR)SR=RI[0];var m=M[SR],raw=R[SR],ags=[];
  raw.forEach(function(r){if(r[3]&&ags.indexOf(r[3])<0)ags.push(r[3])});ags.sort();
  var f=raw.slice();if(AG!=="all")f=f.filter(function(r){return r[3]===AG});
  f.sort(function(x,y){var a=x[SC],b=y[SC];if(a==null)return 1;if(b==null)return-1;return SD*(a>b?1:a<b?-1:0)});
  var fin=raw.filter(function(r){return r[5]});
  var finAG=(AG!=="all")?fin.filter(function(r){return r[3]===AG}):fin;
  var h="<button class='back' onclick=\"V='races';ren()\">← Provas</button>";
  h+="<div style='display:flex;align-items:baseline;gap:8px;margin-bottom:10px;flex-wrap:wrap'>";
  h+="<h2 style='font-size:17px;font-weight:800'>"+m.n+" "+m.y+"</h2>"+wxBadge(SR)+"</div>";
  h+="<div style='display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap'>";
  h+="<div class='stat'><div class='sv'>"+fin.length+"</div><div class='sl'>Finalizaram</div></div>";
  h+="<div class='stat'><div class='sv sw'>"+sP(av(finAG.map(function(r){return r[6]})),m.sk)+"</div><div class='sl'>Pace nat médio</div></div>";
  h+="<div class='stat'><div class='sv bk'>"+bS(av(finAG.map(function(r){return r[7]})),m.bk)+"</div><div class='sl'>Vel bike média</div></div>";
  h+="<div class='stat'><div class='sv rn'>"+rP(av(finAG.map(function(r){return r[8]})),m.rk)+"</div><div class='sl'>Pace cor médio</div></div></div>";
  h+="<div style='display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap'>";
  h+="<select class='sel' onchange=\"SR=this.value;AG='all';ren()\">";
  RI.forEach(function(id){h+="<option value='"+id+"'"+(SR===id?" selected":"")+">"+M[id].c.split(" ")[0]+" "+M[id].y+"</option>"});
  h+="</select><select class='sel' onchange=\"AG=this.value;ren()\">";
  h+="<option value='all'"+(AG==="all"?" selected":"")+">Todos ("+raw.length+")</option>";
  ags.forEach(function(ag){h+="<option value='"+ag+"'"+(AG===ag?" selected":"")+">"+ag+"</option>"});
  h+="</select></div>";
  h+="<div class='card overflow' style='padding:0'><table><thead><tr>";
  [["#",4],["Nome",0],["AG",3],["AG#",4],["Total",5],["Nat",6],["Pace",96],["T1",9],["Bike",7],["km/h",97],["T2",10],["Cor",8],["Pace",98]].forEach(function(c){
    h+="<th onclick=\"SC="+c[1]+";SD=SC==="+c[1]+"?-SD:1;ren()\">"+c[0]+(SC===c[1]?(SD>0?" ↑":" ↓"):"")+"</th>"});
  h+="</tr></thead><tbody>";

    makeHist('distBike',allFin.filter(function(r){return r[7]}).map(function(r){return r[7]/60}),'Bike','#ea580c',10,'_dc3',fmtH);
    makeHist('distRun',allFin.filter(function(r){return r[8]}).map(function(r){return r[8]/60}),'Corrida','#16a34a',5,'_dc4');
  }catch(e){console.log('Dist error:',e)}
}

    h+="<tr><td style='font-weight:600'>"+m.c.split(' ')[0]+" "+m.y+"</td><td>"+fin.length+"</td>";
    h+="<td style='font-weight:800;font-size:13px'>"+emoji+" "+posT+"º / "+fin.length+"</td>";
    h+="<td class='sw'>"+posS+"º</td><td class='bk'>"+posB+"º</td><td class='rn'>"+posR+"º</td></tr>"});
  h+="</table></div>";
  h+="</div>";
  // Diagnostic - use most recent edition
  var diagId=simIds[simIds.length-1];
  var diagFin=R[diagId].filter(function(r){return r[3]===AG&&r[5]});
  if(diagFin.length>5){
    diagFin.sort(function(a,b){return a[5]-b[5]});
    var n=diagFin.length;
    function posOf(arr,val){var c=0;arr.forEach(function(v){if(v<val)c++});return c+1}
    var pT=posOf(diagFin.map(function(r){return r[5]}),totalS);
    var pS=posOf(diagFin.filter(function(r){return r[6]}).map(function(r){return r[6]}),swimS);
    var pB=posOf(diagFin.filter(function(r){return r[7]}).map(function(r){return r[7]}),bikeS);
    var pR=posOf(diagFin.filter(function(r){return r[8]}).map(function(r){return r[8]}),runS);
    var nS=diagFin.filter(function(r){return r[6]}).length;
    var nB=diagFin.filter(function(r){return r[7]}).length;
    var nR=diagFin.filter(function(r){return r[8]}).length;
    // Percentile (lower = better)
    var pcT=Math.round(pT/n*100),pcS=Math.round(pS/nS*100),pcB=Math.round(pB/nB*100),pcR=Math.round(pR/nR*100);
    // Find strongest and weakest
    var mods=[{name:'Natação',pc:pcS,pos:pS,n:nS,c:'var(--sw)'},{name:'Bike',pc:pcB,pos:pB,n:nB,c:'var(--bk)'},{name:'Corrida',pc:pcR,pos:pR,n:nR,c:'var(--rn)'}];
    mods.sort(function(a,b){return a.pc-b.pc});
    var best=mods[0],worst=mods[2];
    
    h+="<div class='card' style='margin-top:12px'><div style='font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;margin-bottom:12px'>Diagnóstico — "+AG+" ("+M[diagId].c.split(' ')[0]+" "+M[diagId].y+")</div>";
    h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px'>";
    // Left: bars
    h+="<div>";
    [{name:'Total',pc:pcT,pos:pT,n:n,c:'#1a1a1a'},{name:'Natação',pc:pcS,pos:pS,n:nS,c:'var(--sw)'},{name:'Bike',pc:pcB,pos:pB,n:nB,c:'var(--bk)'},{name:'Corrida',pc:pcR,pos:pR,n:nR,c:'var(--rn)'}].forEach(function(m){
      var pctBar=Math.max(5,Math.min(95,m.pc));
      h+="<div style='margin-bottom:12px'>";
      h+="<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span style='font-size:13px;font-weight:600'>"+m.name+"</span><span style='font-size:13px;font-weight:700;color:"+m.c+"'>"+m.pos+"º / "+m.n+"</span></div>";
      h+="<div style='background:var(--bg3);border-radius:4px;height:8px;position:relative'><div style='background:"+m.c+";height:100%;border-radius:4px;width:"+pctBar+"%'></div></div>";
      h+="<div style='font-size:11px;color:var(--tx3);margin-top:2px'>Top "+m.pc+"%</div>";
      h+="</div>";
    });
    h+="</div>";
    // Right: analysis
    h+="<div style='display:flex;flex-direction:column;justify-content:center'>";
    h+="<div class='card' style='border-color:#16a34a44;margin-bottom:8px'><div style='font-size:11px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px'>Ponto forte</div><div style='font-size:16px;font-weight:700;color:"+best.c+"'>"+best.name+"</div><div style='font-size:13px;color:var(--tx2)'>"+best.pos+"º de "+best.n+" — top "+best.pc+"%</div></div>";
    h+="<div class='card' style='border-color:#dc262644'><div style='font-size:11px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px'>Onde melhorar</div><div style='font-size:16px;font-weight:700;color:"+worst.c+"'>"+worst.name+"</div><div style='font-size:13px;color:var(--tx2)'>"+worst.pos+"º de "+worst.n+" — top "+worst.pc+"%</div>";
    // How much to improve
    var tgt=Math.ceil(worst.n*best.pc/100);
    if(tgt<worst.pos){
      var tgtTime;
      var wArr;
      if(worst.name==='Natação')wArr=diagFin.filter(function(r){return r[6]}).map(function(r){return r[6]}).sort(function(a,b){return a-b});
      else if(worst.name==='Bike')wArr=diagFin.filter(function(r){return r[7]}).map(function(r){return r[7]}).sort(function(a,b){return a-b});
      else wArr=diagFin.filter(function(r){return r[8]}).map(function(r){return r[8]}).sort(function(a,b){return a-b});
      if(tgt>0&&tgt<=wArr.length){
        var currentTime=worst.name==='Natação'?swimS:worst.name==='Bike'?bikeS:runS;
        var targetTime=wArr[tgt-1];
        var diff=currentTime-targetTime;
        if(diff>0){
          var dm=Math.floor(diff/60),ds=Math.round(diff%60);
          h+="<div style='font-size:12px;color:var(--tx2);margin-top:6px'>Se melhorar <b>"+(dm?dm+"m":"")+ds+"s</b> na "+worst.name.toLowerCase()+", iguala seu ponto forte</div>";
        }
      }
    }
    h+="</div></div>";
    h+="</div></div>";
  }
  el.innerHTML=h;
}

window.tCmp=function(id){if(!CR)CR=RI.slice();var i=CR.indexOf(id);if(i>=0)CR.splice(i,1);else CR.push(id);ren()};
SR=RI[0];ren();
</script></body></html>
